packages:
  - 'apps/*'
  - 'examples/*'
  - 'packages/*'

allowBuilds:
  '@firebase/util': true
  core-js: true
  esbuild: true
  msgpackr-extract: true
  protobufjs: true
  sharp: true

# transitive deps of rolldown-plugin-dts@0.27.6 published <24h ago; provenance
# verified (yuku-toolchain, adopted by rolldown-plugin-dts for TS7 support)
minimumReleaseAgeExclude:
  - 'rolldown-plugin-dts@0.27.6'
  - posthog-js@1.399.2 || 1.406.2
  - 'yuku-parser@0.5.48'
  - 'yuku-codegen@0.5.48'
