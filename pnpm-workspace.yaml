packages:
  - 'apps/*'
  - 'examples/*'
  - 'packages/*'

allowBuilds:
  '@firebase/util': true
  core-js: true
  esbuild: true
  msgpackr-extract: true
  protobufjs: true
  sharp: true

# transitive deps of rolldown-plugin-dts@0.27.6 published <24h ago; provenance
# verified (yuku-toolchain, adopted by rolldown-plugin-dts for TS7 support)
minimumReleaseAgeExclude:
  - 'rolldown-plugin-dts@0.27.6'
  - 'posthog-js@1.399.2'
  - 'yuku-parser@0.5.48'
  - 'yuku-codegen@0.5.48'
  - '@yuku-parser/binding-*'
  - '@yuku-codegen/binding-*'
  - '@changesets/cli@2.31.1'
  - '@tanstack/react-start-rsc@0.1.31'
  - '@tanstack/react-start@1.168.32'
  - '@tanstack/router-plugin@1.168.23'
  - '@tanstack/start-plugin-core@1.171.24'
  - tsdown@0.22.12
  - verkit@0.1.0
